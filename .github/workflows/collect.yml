name: Collect model accuracy data

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/collect.mjs
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          PIRATEWEATHER_API_KEY: ${{ secrets.PIRATEWEATHER_API_KEY }}
          SETTINGS_REPO_TOKEN: ${{ secrets.SETTINGS_REPO_TOKEN }}
      - name: Commit data
        id: commit
        run: |
          git config user.name "ottoreiku"
          git config user.email "ottoreiku@protonmail.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update model accuracy data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger site deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
